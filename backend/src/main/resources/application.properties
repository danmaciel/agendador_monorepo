spring.application.name=agendador-backend

# Database H2 (dev)
spring.datasource.url=jdbc:h2:mem:agendador
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=${JWT_SECRET:chave-secreta-padrao-para-desenvolvimento-minimo-256-bits}
jwt.expiration=${JWT_EXPIRATION:3600000}

# Admin inicial
app.admin.login=${APP_ADMIN_LOGIN:admin}
app.admin.senha=${APP_ADMIN_SENHA:admin123}
app.admin.nome=${APP_ADMIN_NOME:Administrador}

# Server
server.port=8080

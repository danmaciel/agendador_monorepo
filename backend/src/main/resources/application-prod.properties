# PostgreSQL - Producao
spring.datasource.url=jdbc:postgresql://localhost:5432/agendador_database
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=@Abc123
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=${JWT_SECRET:chave-secreta-padrao-para-desenvolvimento-minimo-256-bits}
jwt.expiration=${JWT_EXPIRATION:3600000}

# Admin inicial
app.admin.login=${APP_ADMIN_LOGIN:admin}
app.admin.senha=${APP_ADMIN_SENHA:admin123}
app.admin.nome=${APP_ADMIN_NOME:Administrador}

# Server
server.port=8080
spring.h2.console.enabled=false
